<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>User Registration</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow">
          <div class="card-body">
            <h3 class="card-title text-center mb-4">User Registration</h3>

            <form id="registrationForm">
              <!-- First Name -->
              <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" id="firstName" class="form-control" required>
              </div>

              <!-- Last Name -->
              <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" id="lastName" class="form-control" required>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-lahibel">Email</label>
                <input type="email" id="email" class="form-control" required>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
              </div>

              <!-- Select Menu -->
              <div class="mb-3">
                <label class="form-label">Country</label>
                <select id="country" class="form-select" required>
                  <option value="">Select your country</option>
                  <option>USA</option>
                  <option>Canada</option>
                  <option>UK</option>
                  <option>Australia</option>
                </select>
              </div>

              <!-- Radio Buttons -->
              <div class="mb-3">
                <label class="form-label d-block">Account Type</label>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="accountType" value="Standard" required>
                  <label class="form-check-label">Standard</label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="accountType" value="Premium">
                  <label class="form-check-label">Premium</label>
                </div>
              </div>

              <!-- Text Area -->
              <div class="mb-3">
                <label class="form-label">About You</label>
                <textarea id="about" class="form-control" rows="4" placeholder="Tell us a little about yourself..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-3">
                Register
              </button>

              <button type="reset" id="resetBtn" class="btn btn-danger w-100">
                Reset
              </button>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">
            <h4 class="card-title text-center mb-3">Animal List</h4>
            <div id="content"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mb-6" style="margin-bottom: 50px;">&nbsp;</div>
  <script src="script.js"></script>
</body>
</html>
